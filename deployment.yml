apiVersion: v1
kind: ConfigMap
metadata:
  name: country-service-config
data:
  DB_HOST: "mysql-service"
  DB_PORT: "3306"
  DB_NAME: "country_db"
  DB_USER: "root"
---
apiVersion: v1
kind: Secret
metadata:
  name: country-service-secret
type: Opaque
data:
  # store it in secrets(base 64 password)
  DB_PASSWORD: cGFzc3dvcmQ=
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: country-integration-app
  labels:
    app: country-integration
namespace: ncba-loop-integration-tests
spec:
  replicas: 3
  selector:
    matchLabels:
      app: country-integration
  template:
    metadata:
      labels:
        app: country-integration
    spec:
      containers:
        - name: microservice
          image: {{IMG_URL}}:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: country-service-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: country-service-secret
                  key: DB_PASSWORD
          resources:
            limits:
              cpu: "500m"
              memory: "512Mi"
            requests:
              cpu: "250m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: country-integration-service
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: country-integration